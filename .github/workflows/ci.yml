name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  PNPM_VERSION: 10.30.3

# Least-privilege default token — jobs opt into more only where needed.
permissions:
  contents: read

# Cancel superseded runs on PRs; never cancel a main-branch (post-merge) run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# ══════════════════════════════════════════════════════════════════════════════
#
#  Flow diagram
#
#  Static   env-audit ──────────────────────────────────────────────────────┐
#           i18n-check                                                       │
#                                                                            │
#  Web      web-lint ──►web-typecheck ──►web-build ──►web-tests             │
#                                                 └──►web-react-doctor       │
#                                                 └───────────────────────────────►docker-build-web
#                                                                            │         └──►smoke-test (/api/health)
#  API      api-typecheck ──►api-tests ──►api-build ──►api-migration-drift ──────►docker-build-api
#                                                                            │
#  Docker   docker-validate ───────────────────────────────────────────────►┘
#           (both docker-build-* need docker-validate + their app build)
#
# ══════════════════════════════════════════════════════════════════════════════

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # STATIC CHECKS — run in parallel, no install needed
  # ════════════════════════════════════════════════════════════════════════════

  env-audit:
    name: 🔍 Env · Audit .env.example
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Verify web .env.example
        run: |
          REQUIRED_WEB=(
            "API_URL"
            "NEXT_PUBLIC_SITE_NAME"
            "NEXT_PUBLIC_SITE_URL"
            "NEXT_PUBLIC_DEFAULT_LOCALE"
            "REVALIDATION_SECRET"
          )
          MISSING=()
          for VAR in "${REQUIRED_WEB[@]}"; do
            if ! grep -q "^${VAR}=" apps/web/.env.example; then
              MISSING+=("$VAR")
            fi
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "❌ Missing from apps/web/.env.example:"
            printf '  - %s\n' "${MISSING[@]}"
            exit 1
          fi
          echo "✅ apps/web/.env.example OK"

      - name: Verify API .env.example
        run: |
          # Extract all process.env['VAR'] references from configuration.ts
          # and verify each one is documented in .env.example.
          # This catches new env vars added to config but forgotten in .env.example.
          node -e "
            const fs = require('fs');
            const src = fs.readFileSync('apps/api/src/config/configuration.ts', 'utf8');
            const example = fs.readFileSync('apps/api/.env.example', 'utf8');

            // Match process.env['VAR'] or process.env[\"VAR\"]
            const refs = [...src.matchAll(/process\.env\[['\"]([\w]+)['\"]]/g)].map(m => m[1]);
            const unique = [...new Set(refs)];
            const exampleKeys = new Set(
              example.split('\n')
                .filter(l => /^[A-Z][A-Z0-9_]+=/.test(l))
                .map(l => l.split('=')[0])
            );

            const missing = unique.filter(v => !exampleKeys.has(v));
            if (missing.length > 0) {
              console.error('❌ Vars in configuration.ts missing from apps/api/.env.example:');
              missing.forEach(v => console.error('  -', v));
              process.exit(1);
            }
            console.log('✅ All ' + unique.length + ' API env vars documented in .env.example');
          "

  i18n-check:
    name: 🌐 i18n · Key completeness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Check es.json and en.json carry the exact same key set
        run: |
          node -e "
            const fs = require('fs');
            const es = JSON.parse(fs.readFileSync('apps/web/messages/es.json', 'utf8'));
            const en = JSON.parse(fs.readFileSync('apps/web/messages/en.json', 'utf8'));

            function getKeys(obj, prefix = '') {
              return Object.keys(obj).flatMap(key => {
                const fullKey = prefix ? \`\${prefix}.\${key}\` : key;
                return typeof obj[key] === 'object' && obj[key] !== null
                  ? getKeys(obj[key], fullKey)
                  : [fullKey];
              });
            }

            const esKeys = getKeys(es);
            const enSet = new Set(getKeys(en));
            const esSet = new Set(esKeys);
            const missingEn = esKeys.filter(k => !enSet.has(k));
            const missingEs = [...enSet].filter(k => !esSet.has(k));

            if (missingEn.length > 0) {
              console.error('❌ Keys in es.json missing from en.json:');
              missingEn.forEach(k => console.error('  -', k));
            }
            if (missingEs.length > 0) {
              console.error('❌ Keys in en.json missing from es.json:');
              missingEs.forEach(k => console.error('  -', k));
            }
            if (missingEn.length || missingEs.length) process.exit(1);
            console.log('✅ All ' + esKeys.length + ' i18n keys present in both locales');
          "

  # ════════════════════════════════════════════════════════════════════════════
  # WEB — Next.js
  # ════════════════════════════════════════════════════════════════════════════

  web-lint:
    name: 🧹 Web · Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @box33/web lint

  web-typecheck:
    name: 🔷 Web · TypeCheck
    runs-on: ubuntu-latest
    needs: web-lint
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @box33/web typecheck

  web-build:
    name: 🏗️ Web · Build
    runs-on: ubuntu-latest
    needs: web-typecheck
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm --filter @box33/web build
        env:
          API_URL: http://localhost:3001
          NEXT_PUBLIC_SITE_NAME: 'CI Build'
          NEXT_PUBLIC_SITE_URL: 'http://localhost:3000'
          NEXT_PUBLIC_DEFAULT_LOCALE: 'es'
          REVALIDATION_SECRET: 'ci-revalidation-secret-minimum-32-chars'

  web-tests:
    name: 🧪 Web · Tests
    runs-on: ubuntu-latest
    needs: web-build
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run tests
        run: pnpm --filter @box33/web test -- --coverage

  web-react-doctor:
    name: 🩺 Web · React Doctor
    runs-on: ubuntu-latest
    needs: web-build
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Run React Doctor (80/100 threshold)
        # Pinned on purpose: with `@latest` the gate scores whatever the newest
        # release happens to grade that day. Bump this deliberately, with the
        # score fixes that the new rules demand.
        run: |
          RAW=$(npx -y react-doctor@0.7.6 apps/web --score 2>&1)
          SCORE=$(echo "$RAW" | grep -oE '[0-9]+' | tail -1)
          echo "React Doctor score: ${SCORE:-unknown}/100"
          if [ -z "$SCORE" ]; then
            echo "❌ Could not parse React Doctor score — failing closed (a quality gate must never silently pass)"
            echo "$RAW"
            exit 1
          fi
          if awk "BEGIN {exit !($SCORE >= 80)}"; then
            echo "✅ Passing: ${SCORE}/100"
          else
            echo "❌ Score ${SCORE}/100 is below 80/100 threshold"
            exit 1
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # API — NestJS
  # ════════════════════════════════════════════════════════════════════════════

  api-typecheck:
    name: 🔷 API · TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @box33/api typecheck

  api-tests:
    name: 🧪 API · Tests
    runs-on: ubuntu-latest
    needs: api-typecheck
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @box33/api test -- --coverage

  api-build:
    name: 🏗️ API · Build
    runs-on: ubuntu-latest
    needs: api-tests
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @box33/api build

  # ════════════════════════════════════════════════════════════════════════════
  # DOCKER
  # ════════════════════════════════════════════════════════════════════════════

  docker-validate:
    name: 🐳 Docker · Validate configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Validate docker-compose.yml
        run: docker compose config --quiet
      - name: Validate docker-compose.prod.yml
        run: docker compose -f docker-compose.prod.yml config --quiet

  api-migration-drift:
    name: 🗄️ API · Migration drift
    runs-on: ubuntu-latest
    needs: api-build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: box33_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Guard against destructive (non-expand) migrations
        # Zero-downtime requires expand/contract: an up() must not DROP/RENAME/retype
        # columns or add a NOT NULL column without a default, or it crashes the old
        # version still serving during the rolling overlap. A genuinely destructive
        # contract-phase migration must opt in with a "migration-safety: contract-approved"
        # comment AND ship as a separate maintenance deploy (never a rolling one).
        run: |
          # Covers raw SQL DDL AND the TypeORM schema API (queryRunner.dropColumn/
          # dropTable/changeColumn/renameColumn/renameTable) used inside up() bodies.
          PATTERN='DROP COLUMN|DROP TABLE|RENAME COLUMN|RENAME TO|ALTER COLUMN .* TYPE|ADD COLUMN .* NOT NULL|dropColumn|dropTable|changeColumn|renameColumn|renameTable'
          FAIL=0
          for f in apps/api/src/database/migrations/*.ts; do
            up=$(awk '/public async up/,/public async down/' "$f")
            hits=$(printf '%s\n' "$up" | grep -iEn "$PATTERN" || true)
            # An ADD COLUMN ... NOT NULL is safe when it carries a DEFAULT.
            hits=$(printf '%s\n' "$hits" | grep -iv 'NOT NULL .*DEFAULT' || true)
            if [ -n "$hits" ] && ! grep -q 'migration-safety: contract-approved' "$f"; then
              echo "::error file=$f::Destructive DDL in up() without expand/contract opt-in:"
              printf '%s\n' "$hits"
              FAIL=1
            fi
          done
          if [ "$FAIL" = "1" ]; then exit 1; fi
          echo "✅ All migrations are expand-safe (or explicitly contract-approved)."
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run migrations
        run: pnpm --filter @box33/api migration:run
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: box33_ci
      - name: Detect entity/migration drift
        # TypeORM migration:generate exits 0 and writes a file when entities
        # differ from the migrated schema (drift found), exits 1 when already
        # in sync. We use that to gate the pipeline.
        run: |
          cd apps/api
          set +e
          OUT=$(node_modules/.bin/typeorm-ts-node-commonjs migration:generate \
               src/database/migrations/CiDriftCheck \
               -d src/database/data-source.ts 2>&1)
          CODE=$?
          echo "$OUT"
          # exit 0 = a migration was generated = drift exists → fail.
          if [ "$CODE" -eq 0 ]; then
            echo "❌ Entity/migration drift detected — create a migration:"
            echo "   pnpm --filter @box33/api migration:generate src/database/migrations/YourName"
            exit 1
          fi
          # Only the explicit 'no changes' message is a real pass. Any OTHER
          # non-zero exit (compile error, DB down, CLI change) must FAIL closed —
          # otherwise the gate silently passes on infrastructure errors.
          if echo "$OUT" | grep -q "No changes in database schema were found"; then
            echo "✅ Entities match migrations — no drift."
            exit 0
          fi
          echo "❌ Drift check failed for an unexpected reason — failing closed."
          exit 1
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: box33_ci

  docker-build-api:
    name: 🐳 Docker · Build API image
    runs-on: ubuntu-latest
    needs: [api-migration-drift, docker-validate]
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0
      - name: Build API image
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: box33-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-build-web:
    name: 🐳 Docker · Build Web image
    runs-on: ubuntu-latest
    needs: [web-build, docker-validate]
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0
      - name: Build Web image
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          load: true
          tags: box33-web:${{ github.sha }}
          build-args: |
            API_URL=http://api:3001
            NEXT_PUBLIC_SITE_URL=http://localhost:3000
            NEXT_PUBLIC_SITE_NAME=BOX33
            NEXT_PUBLIC_DEFAULT_LOCALE=es
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test — container starts and /api/health responds
        run: |
          docker run -d --name web-smoke \
            -p 3000:3000 \
            -e API_URL=http://localhost:3001 \
            -e REVALIDATION_SECRET=ci-smoke-secret-minimum-32-chars \
            box33-web:${{ github.sha }}

          echo "Waiting for /api/health…"
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "✅ /api/health → 200 (attempt $i)"
              docker rm -f web-smoke
              exit 0
            fi
            echo "  attempt $i: got $STATUS, retrying in 3s"
            sleep 3
          done

          echo "❌ /api/health never returned 200 — dumping logs:"
          docker logs web-smoke
          docker rm -f web-smoke
          exit 1

  # ════════════════════════════════════════════════════════════════════════════
  # INTEGRATION — boot the REAL API image with prod-shaped config, let the
  # entrypoint run migrations, and assert readiness. Catches broken bootstrap, DI
  # wiring, prod-only env guards, and migration failures that unit tests and the
  # drift check never exercise (nothing else ever runs the API artifact).
  # ════════════════════════════════════════════════════════════════════════════

  integration-api:
    name: 🔌 API · Integration smoke (boot + migrate + ready)
    runs-on: ubuntu-latest
    needs: [api-build, docker-validate]
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: box33_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0
      - name: Build API image
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          load: true
          tags: box33-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Boot API with production config (entrypoint runs migrations)
        run: |
          docker run -d --name api --network host \
            -e NODE_ENV=production \
            -e PORT=3001 \
            -e DB_HOST=127.0.0.1 -e DB_PORT=5432 \
            -e DB_USER=postgres -e DB_PASSWORD=postgres -e DB_NAME=box33_ci \
            -e JWT_SECRET=ci-integration-secret-not-for-prod-0123456789 \
            -e ADMIN_EMAIL=coach@box33.local \
            -e ADMIN_PASSWORD=ci-admin-password-1 \
            -e FRONTEND_URL=http://localhost:3000 \
            box33-api:ci
      - name: Poll /api/health/ready until 200
        run: |
          for i in $(seq 1 30); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/health/ready || true)
            if [ "$CODE" = "200" ]; then echo "✅ /api/health/ready → 200 (attempt $i)"; exit 0; fi
            echo "  attempt $i: got $CODE, retrying in 4s"
            sleep 4
          done
          echo "❌ API never became ready — dumping logs:"
          docker logs api
          exit 1
      - name: Assert /api/health/live responds
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/health/live || true)
          [ "$CODE" = "200" ] || { echo "❌ /api/health/live returned $CODE"; docker logs api; exit 1; }
          echo "✅ /api/health/live → 200"

  # ════════════════════════════════════════════════════════════════════════════
  # SECURITY — secret scanning
  # ════════════════════════════════════════════════════════════════════════════

  secret-scan:
    name: 🔑 Security · Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # gitleaks-action lists the PR's commits via the API on pull_request events,
    # which needs pull-requests: read on top of the default contents: read.
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ════════════════════════════════════════════════════════════════════════════
  # META — lint the pipeline itself + enforce the conventional PR title that
  # release-please consumes to compute version bumps and the changelog.
  # ════════════════════════════════════════════════════════════════════════════

  pr-title:
    name: 🏷️ PR · Conventional title
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    timeout-minutes: 5
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  hadolint:
    name: 🐳 Lint · Dockerfiles (hadolint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: apps/api/Dockerfile
          failure-threshold: error
      - name: Lint Web Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: apps/web/Dockerfile
          failure-threshold: error

  actionlint:
    name: 🔧 Lint · GitHub Actions (actionlint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7 # v2.2.0

  # ════════════════════════════════════════════════════════════════════════════
  # E2E — full-stack Playwright smoke. Because the seed blocks the API's
  # listen(), waiting for /api/health/ready==200 also guarantees the seed
  # finished → content + catalog data exist before the browser hits the page.
  # ════════════════════════════════════════════════════════════════════════════

  e2e:
    name: 🎭 E2E · Playwright (full stack)
    runs-on: ubuntu-latest
    needs: [docker-validate]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browser
        run: pnpm --filter @box33/web exec playwright install --with-deps chromium
      - name: Boot full stack (postgres + api + web + seed)
        run: docker compose up -d --build
      - name: Wait for API readiness (also waits out the blocking seed)
        run: |
          for i in $(seq 1 60); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/health/ready || true)
            if [ "$CODE" = "200" ]; then echo "✅ API ready (attempt $i)"; break; fi
            echo "  api attempt $i: got $CODE, retrying in 5s"
            sleep 5
            if [ "$i" = "60" ]; then echo "❌ API never ready"; docker compose logs --tail=150 api; exit 1; fi
          done
      - name: Wait for Web
        run: |
          for i in $(seq 1 30); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/health || true)
            if [ "$CODE" = "200" ]; then echo "✅ Web up (attempt $i)"; break; fi
            echo "  web attempt $i: got $CODE, retrying in 5s"
            sleep 5
            if [ "$i" = "30" ]; then echo "❌ Web never up"; docker compose logs --tail=150 web; exit 1; fi
          done
      - name: Run Playwright E2E
        run: pnpm --filter @box33/web exec playwright test
        env:
          E2E_BASE_URL: http://localhost:3000
      - name: Dump stack logs on failure
        if: failure()
        run: docker compose logs --tail=200
      - name: Tear down
        if: always()
        run: docker compose down -v

  # ════════════════════════════════════════════════════════════════════════════
  # AGGREGATE — the SINGLE required status check for branch protection. Fails if
  # ANY job failed or was cancelled, so adding/renaming a job can never silently
  # drop a gate from "required". Point branch protection at THIS job only.
  # ════════════════════════════════════════════════════════════════════════════

  ci-success:
    name: ✅ CI passed
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - env-audit
      - i18n-check
      - web-lint
      - web-typecheck
      - web-build
      - web-tests
      - web-react-doctor
      - api-typecheck
      - api-tests
      - api-build
      - docker-validate
      - api-migration-drift
      - docker-build-api
      - docker-build-web
      - integration-api
      - secret-scan
      - pr-title
      - hadolint
      - actionlint
      - e2e
    steps:
      - name: Verify no required job failed
        # 'skipped' is allowed (event-gated jobs like pr-title don't run on push);
        # only an actual failure or cancellation fails the aggregate gate.
        run: |
          RESULTS='${{ join(needs.*.result, ' ') }}'
          echo "Job results: $RESULTS"
          for r in $RESULTS; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "❌ A required job failed or was cancelled (saw: $r)."
              exit 1
            fi
          done
          echo "✅ No required job failed."
